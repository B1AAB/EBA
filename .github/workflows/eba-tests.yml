name: EBA Tests

on: [push, pull_request]

jobs:
  build:
    name: Build & test on .NET ${{ matrix.dotnet-version }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      
      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
          
      - name: Install dependencies
        run: dotnet restore tests/AAB.EBA.Tests/AAB.EBA.Tests.csproj
        
      - name: Build AAB.EBA
        run: dotnet build src/AAB.EBA/AAB.EBA.csproj --configuration Release --no-restore
        
      - name: Test AAB.EBA.Tests
        run: dotnet test tests/AAB.EBA.Tests/AAB.EBA.Tests.csproj --configuration Release --no-restore --verbosity normal